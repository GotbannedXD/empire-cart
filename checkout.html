<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Cart - Checkout</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Standalone image option overrides matching marketplace visuals */
        .momo-box { 
            padding: 12px 16px; 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            cursor: pointer; 
            margin-bottom: 14px; 
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            border: 2px solid #e2e8f0;
            background: #ffffff;
        }
        .momo-box input { scale: 1.4; margin-right: 4px; cursor: pointer; }
        
        .momo-box.momo-mtn:has(input:checked) { border-color: #ffcc00; background-color: #fffdf2; }
        .momo-box.momo-airtel:has(input:checked) { border-color: #ff1400; background-color: #fff5f5; }
        .momo-box.momo-zamtel:has(input:checked) { border-color: #009639; background-color: #f2fbf5; }

        .momo-logo-wrapper {
            width: 80px;
            height: 40px;
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            flex-shrink: 0;
            border: 1px solid #e2e8f0;
        }
        .momo-logo-img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .provider-text { font-family: 'Segoe UI', system-ui, sans-serif; font-weight: 700; color: #333333; font-size: 15px; }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="index.html" class="brand-wrapper">
            <img src="empire cart logo.jpg" class="brand-logo-img" alt="Empire Cart">
            <div class="brand-text">Empire<span>Cart</span></div>
        </a>
    </header>

    <main class="container checkout-container">
        <!-- Return Navigation for Standalone Page Context -->
        <div style="margin-bottom: 20px;">
            <a href="marketplace.html" style="text-decoration: none; display: inline-block; padding: 8px 16px; border: 1px solid var(--text-muted); color: var(--text-muted); font-weight: 600; font-size: 14px; border-radius: var(--radius-md); transition: background 0.2s;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='transparent'">
                ← Abort & Return to Shop
            </a>
        </div>

        <h2>Secure Checkout Terminal</h2>
        
        <div class="grid-2" style="margin-top: 20px;">
            <section class="form-card">
                <h3>1. Delivery Information</h3>
                <form style="margin-top: 15px;">
                    <div class="form-group">
                        <label for="province">Province</label>
                        <select id="province" required>
                            <option value="copperbelt">Copperbelt</option>
                            <option value="lusaka">Lusaka</option>
                            <option value="southern">Southern</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="city">City / Town</label>
                        <input type="text" id="city" value="Kitwe" required>
                    </div>

                    <div class="form-group">
                        <label for="landmark">Nearest Landmark & Directions</label>
                        <textarea id="landmark" rows="3" placeholder="e.g., Opposite the Total Filling Station, near the local market" required></textarea>
                    </div>
                </form>
            </section>

            <section class="form-card">
                <h3>2. Payment Method</h3>
                <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">Select your preferred Mobile Money Network:</p>
                
                <div class="momo-selector">
                    <!-- MTN Option -->
                    <label class="momo-box momo-mtn">
                        <input type="radio" name="payment" value="mtn" checked onclick="updatePlaceholder('mtn')">
                        <div class="momo-logo-wrapper"><img src="MTN logo.jpg" class="momo-logo-img" alt="MTN"></div>
                        <span class="provider-text">MTN MoMo</span>
                    </label>
                    <!-- Airtel Option -->
                    <label class="momo-box momo-airtel">
                        <input type="radio" name="payment" value="airtel" onclick="updatePlaceholder('airtel')">
                        <div class="momo-logo-wrapper"><img src="AIRTEL logo.png" class="momo-logo-img" alt="Airtel"></div>
                        <span class="provider-text">Airtel Money</span>
                    </label>
                    <!-- Zamtel Option -->
                    <label class="momo-box momo-zamtel">
                        <input type="radio" name="payment" value="zamtel" onclick="updatePlaceholder('zamtel')">
                        <div class="momo-logo-wrapper"><img src="ZAMTEL logo.jpg" class="momo-logo-img" alt="Zamtel"></div>
                        <span class="provider-text">Zamtel Kwacha</span>
                    </label>
                </div>

                <div class="form-group" style="margin-top: 20px;">
                    <label for="phone">Mobile Money Number</label>
                    <input type="tel" id="phone" placeholder="e.g., 096XXXXXXX or 076XXXXXXX" required>
                </div>

                <button id="pay-btn" class="btn-purple" style="width: 100%; padding: 12px; background: #16a34a; border: none; font-weight: bold; cursor: pointer;" onclick="simulatePayment()">Confirm & Pay Order</button>
            </section>
        </div>
    </main>

    <script>
        function updatePlaceholder(provider) {
            const input = document.getElementById('phone');
            if (provider === 'mtn') input.placeholder = "e.g., 096XXXXXXX or 076XXXXXXX";
            else if (provider === 'airtel') input.placeholder = "e.g., 097XXXXXXX or 077XXXXXXX";
            else if (provider === 'zamtel') input.placeholder = "e.g., 095XXXXXXX or 075XXXXXXX";
        }
        function simulatePayment() {
            const btn = document.getElementById('pay-btn');
            btn.innerText = "Requesting USSD Gateway Pin Prompt...";
            btn.style.background = "#d97706";
            btn.disabled = true;
            setTimeout(() => {
                alert("Simulated Payment Complete! Redirecting configuration details loop.");
                window.location.href = "marketplace.html";
            }, 2000);
        }
    </script>
</body>
</html>
